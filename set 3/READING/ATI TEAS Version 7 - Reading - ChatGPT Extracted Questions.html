    }

      position:absolute;
      left:6px;
      right:6px;
      top:5px;
      height:6px;
      background:#fff;
    }
    .calc:after {
      content:"";

      top:18px;

      height:4px;

      border-top:none;
      position:relative;
    }

      content:"";
      position:absolute;

      top:-9px;
      width:13px;
      height:24px;
      background:#555;
      clip-path:polygon(0 0,100% 0,100% 78%,50% 58%,0 78%);

      color:#444;

      padding:0;

      font-size:18px;
      color:#444;

      font-size:16px;
      color:#3d3d3d;
      margin:0 0 6px;
      padding-bottom:5px;
      border-bottom:1px solid #e5e5e5;

      gap:7px;
      padding-bottom: 10px;

      gap:16px;

      cursor:pointer;

    }

      background:#fff4f4;
      box-shadow:0 0 2px rgba(225,87,87,.45);

      height:9px;
      border-radius:50%;
      background:#3f9b45;
      box-shadow:0 0 2px #2f7d35;

      height:9px;

      box-shadow:0 0 2px #8f2929;

      height:22px;

      place-items:center;
      flex:0 0 auto;
      margin-top:1px;

      height:9px;
      border-radius:50%;
      background:#656565;
      box-shadow:0 0 2px #333;
    }

      color:#5a5a5a;
      font-size:16px;

      background:#f1fbf3;
      color:#315d34;
      font-weight:700;
      line-height:1.45;
      display:none;

      background:#fff4f4;
      color:#7a2d2d;

        top:5px;
        height:5px;

      .arrow-btn {

        height:42px;
        font-size:12px;
      }
      .status {
        font-size:12px;
      }
    }

    "passageHtml": "<p>The Farallon Islands, or <em>Devil's Teeth</em>, as they are referred to by sailors, are a group of small islands with rocky, barren terrain and treacherous underwater currents, 48 km (30 miles) off the coast of San Francisco, California. Although the islands are small, with a combined total land area of 0.41 km2 (0.16 square miles), they are positioned in a major ocean current, which enables them to house dense populations of birds, rodents, seals, and other water mammals.</p><p>The abundance of wildlife first attracted Russian and American fur traders in the early 1800s, who then nearly eliminated the seal population in the area. The islands then became an agricultural resource for San Francisco during the Gold Rush era when egg companies began harvesting bird eggs on the islands. In 1863, violence between rival egg companies erupted on the islands (known as the Egg War), which inadvertently attracted national attention and provoked lawmakers to pass legislation to protect and rehabilitate the islands' natural ecosystem.</p><p>In 1881, an executive order was passed that decreed egging illegal on the Farallons. This ended private enterprises on the islands and was reinforced in 1909 when President Theodore Roosevelt created the Farallon Reservation to restrict human access and preserve the northern islands. Protection was expanded in 1967 to include all the Farallon Islands, and over time many of the islands' original inhabitants have returned.</p><p>The Farallons are now home to the world's largest population of western gulls. Seals have returned, as well as otters and sea lions, which in turn attract great white sharks. The combination of sharks, underwater currents, and jagged coastline are probably what earned the Farallons their nickname, Devil's Teeth.</p>",

const totalQuestions = questions.length;
const initialSeconds = 60 * 60;
let current = 0;
let answers = Array(questions.length).fill(null);
let remaining = initialSeconds;

const qNumber = document.getElementById('questionNumber');
const brandTitle = document.getElementById('brandTitle');
const passageTitle = document.getElementById('passageTitle');
const passageEl = document.getElementById('passage');
const stimulusEl = document.getElementById('stimulus');
const questionText = document.getElementById('questionText');
const dotsEl = document.getElementById('dots');
const optionsEl = document.getElementById('options');
const feedbackEl = document.getElementById('answerFeedback');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('status');
const mainEl = document.querySelector('.main');
const leftColEl = document.querySelector('.left-col');
const rightColEl = document.querySelector('.right-col');

function buildDots(activeNumber) {
  dotsEl.innerHTML = '';
  for (let i = 1; i <= totalQuestions; i++) {
    const d = document.createElement('span');
    d.className = 'dot' + (i === activeNumber ? ' active' : '');
    dotsEl.appendChild(d);
  }
}

function setQuestionLayout(item) {
  const hasLeftContent = Boolean((item.passageTitle || '').trim() || (item.passageHtml || '').trim());
  if (hasLeftContent) {
    mainEl.style.gridTemplateColumns = '';
    leftColEl.style.display = '';
    rightColEl.style.paddingTop = '';
  } else {
    mainEl.style.gridTemplateColumns = '1fr';
    leftColEl.style.display = 'none';
    rightColEl.style.paddingTop = '4px';
  }
}

function render() {
  const item = questions[current];
  setQuestionLayout(item);

  brandTitle.textContent = item.sectionTitle || 'ATI TEAS Version 7 - Science';
  qNumber.textContent = `Question: ${item.number} of ${totalQuestions}`;
  passageTitle.textContent = item.passageTitle || '';
  passageEl.innerHTML = item.passageHtml || '';
  stimulusEl.innerHTML = item.stimulusHtml || item.stimulus || '';
  questionText.innerHTML = (item.question || '').replace(/\n/g, '<br>');

  buildDots(item.number);

  optionsEl.innerHTML = '';
  item.options.forEach((opt, index) => {
    const row = document.createElement('div');
    const answered = answers[current] !== null;
    let className = 'option';
    if (answers[current] === index) className += ' selected';
    if (answered && index === item.correctIndex) className += ' correct';
    if (answered && answers[current] === index && index !== item.correctIndex) className += ' incorrect';
    row.className = className;
    row.tabIndex = 0;

    const radio = document.createElement('span');
    radio.className = 'radio';

    const label = document.createElement('span');
    label.className = 'option-text';
    label.textContent = opt;

    row.appendChild(radio);
    row.appendChild(label);

    row.addEventListener('click', () => selectOption(index));
    row.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectOption(index);
      }
    });

    optionsEl.appendChild(row);
  });

  if (answers[current] !== null) {
    const correctText = item.options[item.correctIndex];
    const isCorrect = answers[current] === item.correctIndex;
    feedbackEl.className = 'answer-feedback show' + (isCorrect ? '' : ' wrong');
    feedbackEl.textContent = isCorrect
      ? `Correct. Answer: ${correctText}`
      : `Incorrect. Correct answer: ${correctText}`;
  } else {
    feedbackEl.className = 'answer-feedback';
    feedbackEl.textContent = '';
  }

  prevBtn.disabled = current === 0;
  nextBtn.textContent = current === questions.length - 1 ? 'Finish' : 'Continue';
  statusEl.textContent = `${answers.filter(a => a !== null).length} of ${questions.length} uploaded science questions answered`;
}

function selectOption(index) {
  answers[current] = index;
  render();
}

prevBtn.addEventListener('click', () => {
  if (current > 0) {
    current--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

nextBtn.addEventListener('click', () => {
  if (current < questions.length - 1) {
    current++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    alert('You have reached the end of the uploaded science questions.');
  }
});

function tick() {
  if (remaining > 0) remaining--;
  const h = String(Math.floor(remaining / 3600)).padStart(2, '0');
  const m = String(Math.floor((remaining % 3600) / 60)).padStart(2, '0');
  const s = String(remaining % 60).padStart(2, '0');
  timerEl.textContent = `${h}:${m}:${s}`;
}

render();
setInterval(tick, 1000);
</script>
