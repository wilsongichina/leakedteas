const totalQuestions = questions.length;
let current = 0;
let answers = Array(totalQuestions).fill(null);
let remaining = 60 * 60;
const qNumber = document.getElementById('questionNumber');
const brandTitle = document.getElementById('brandTitle');
const stimulusEl = document.getElementById('stimulus');
const questionText = document.getElementById('questionText');
const dotsEl = document.getElementById('dots');
const optionsEl = document.getElementById('options');
const feedbackEl = document.getElementById('answerFeedback');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('status');
function buildDots(active){dotsEl.innerHTML='';for(let i=1;i<=totalQuestions;i++){const d=document.createElement('span');d.className='dot'+(i===active?' active':'');dotsEl.appendChild(d);}}
function render(){const item=questions[current];brandTitle.textContent=item.sectionTitle;qNumber.textContent=`Question: ${item.sourceNumber} of 38`;stimulusEl.innerHTML=item.stimulusHtml||'';questionText.innerHTML=(item.question||'').replace(/\n/g,'<br>');buildDots(item.number);optionsEl.innerHTML='';item.options.forEach((opt,index)=>{const row=document.createElement('div');const answered=answers[current]!==null;let cls='option';if(answers[current]===index)cls+=' selected';if(answered&&index===item.correctIndex)cls+=' correct';if(answered&&answers[current]===index&&index!==item.correctIndex)cls+=' incorrect';row.className=cls;row.tabIndex=0;const radio=document.createElement('span');radio.className='radio';const label=document.createElement('span');label.className='option-text';label.textContent=opt;row.appendChild(radio);row.appendChild(label);row.addEventListener('click',()=>selectOption(index));row.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();selectOption(index);}});optionsEl.appendChild(row);});if(answers[current]!==null){const correctText=item.options[item.correctIndex];const isCorrect=answers[current]===item.correctIndex;feedbackEl.className='answer-feedback show'+(isCorrect?'':' wrong');feedbackEl.textContent=isCorrect?`Correct. Answer: ${correctText}`:`Incorrect. Correct answer: ${correctText}`;}else{feedbackEl.className='answer-feedback';feedbackEl.textContent='';}prevBtn.disabled=current===0;nextBtn.textContent=current===totalQuestions-1?'Finish':'Continue';statusEl.textContent=`${answers.filter(a=>a!==null).length} of ${totalQuestions} uploaded math questions answered | Source: ${item.sourceFile}`;window.scrollTo({top:0,behavior:'smooth'});}
function selectOption(index){answers[current]=index;render();}
prevBtn.addEventListener('click',()=>{if(current>0){current--;render();}});
nextBtn.addEventListener('click',()=>{if(current<totalQuestions-1){current++;render();}else{alert('You have reached the end of the uploaded math questions.');}});
function tick(){if(remaining>0)remaining--;const h=String(Math.floor(remaining/3600)).padStart(2,'0');const m=String(Math.floor((remaining%3600)/60)).padStart(2,'0');const s=String(remaining%60).padStart(2,'0');timerEl.textContent=`${h}:${m}:${s}`;}
render();setInterval(tick,1000);
  </script>
