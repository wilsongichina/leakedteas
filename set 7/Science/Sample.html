];const totalQuestions=questions.length;let current=0;let answers=Array(totalQuestions).fill(null);let remaining=60*60;const qNumber=document.getElementById('questionNumber'),brandTitle=document.getElementById('brandTitle'),stimulusEl=document.getElementById('stimulus'),questionText=document.getElementById('questionText'),dotsEl=document.getElementById('dots'),optionsEl=document.getElementById('options'),feedbackEl=document.getElementById('answerFeedback'),prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn'),timerEl=document.getElementById('timer'),statusEl=document.getElementById('status');function buildDots(active){dotsEl.innerHTML='';for(let i=1;i<=totalQuestions;i++){const d=document.createElement('span');d.className='dot'+(i===active?' active':'');dotsEl.appendChild(d)}}function render(){const item=questions[current];brandTitle.textContent=item.sectionTitle;qNumber.textContent=`Question: ${item.sourceNumber} of 50`;stimulusEl.innerHTML=item.stimulusHtml||'';stimulusEl.style.display=item.stimulusHtml?'block':'none';questionText.innerHTML=item.questionHtml||(item.question||'').replace(/\n/g,'<br>');buildDots(item.number);optionsEl.innerHTML='';item.options.forEach((opt,index)=>{const row=document.createElement('div');const answered=answers[current]!==null;let cls='option';if(answers[current]===index)cls+=' selected';if(answered&&index===item.correctIndex)cls+=' correct';if(answered&&answers[current]===index&&index!==item.correctIndex)cls+=' incorrect';row.className=cls;row.tabIndex=0;const radio=document.createElement('span');radio.className='radio';const label=document.createElement('span');label.className='option-text';label.textContent=opt;row.appendChild(radio);row.appendChild(label);row.addEventListener('click',()=>selectOption(index));row.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();selectOption(index)}});optionsEl.appendChild(row)});if(answers[current]!==null){const ok=answers[current]===item.correctIndex;feedbackEl.className='answer-feedback show'+(ok?'':' wrong');feedbackEl.textContent=ok?`Correct. Answer: ${item.options[item.correctIndex]}`:`Incorrect. Correct answer: ${item.options[item.correctIndex]}`}else{feedbackEl.className='answer-feedback';feedbackEl.textContent=''}prevBtn.disabled=current===0;nextBtn.textContent=current===totalQuestions-1?'Finish':'Continue';statusEl.textContent=`${answers.filter(a=>a!==null).length} of ${totalQuestions} uploaded Science Set 7 questions answered | Source: ${item.sourceFile}`}function selectOption(index){answers[current]=index;render()}prevBtn.addEventListener('click',()=>{if(current>0){current--;render();window.scrollTo({top:0,behavior:'smooth'})}});nextBtn.addEventListener('click',()=>{if(current<totalQuestions-1){current++;render();window.scrollTo({top:0,behavior:'smooth'})}else{alert('You have reached the end of the uploaded Science Set 7 questions.')}});function tick(){if(remaining>0)remaining--;const h=String(Math.floor(remaining/3600)).padStart(2,'0');const m=String(Math.floor((remaining%3600)/60)).padStart(2,'0');const s=String(remaining%60).padStart(2,'0');timerEl.textContent=`${h}:${m}:${s}`}render();setInterval(tick,1000);</script></body></html>
