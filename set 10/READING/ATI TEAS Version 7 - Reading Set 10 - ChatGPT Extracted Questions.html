    }

      align-items:flex-start;

      margin-bottom: 18px;
      padding: 0 6px;

    }

      content:"";
      position:absolute;
      left:6px;
      right:6px;
      top:5px;
      height:6px;
      background:#fff;
    }
    .calc:after {
      content:"";
      position:absolute;
      left:6px;
      top:18px;
      width:4px;
      height:4px;
      background:#fff;
      box-shadow:9px 0 #fff,18px 0 #fff,0 9px #fff,9px 9px #fff,18px 9px #fff,0 18px #fff,9px 18px #fff,18px 18px #fff;

      color:#555;
      font-weight:700;

      width:22px;
      height:27px;
      border:3px solid #555;
      border-top:none;
      position:relative;
    }

      content:"";
      position:absolute;
      left:5px;
      top:-9px;
      width:13px;
      height:24px;
      background:#555;
      clip-path:polygon(0 0,100% 0,100% 78%,50% 58%,0 78%);

    .passage-title {
      font-weight:700;
      font-size:18px;
      color:#444;
      margin: 0 0 14px;
    }

      font-size:16px;
      line-height:1.52;

      padding: 0 6px 8px;
    }

    }

    }

      font-size:18px;
      color:#444;
      margin: 0 0 2px;
    }

      text-align:left;
    }

      display:block;
      height:auto;
      max-width:100%;
      background:#fff;
      border:0;

      color:#3d3d3d;
      font-size:17px;
      line-height:1.35;
      margin-bottom:16px;

      height:6px;

      height:9px;
      background:var(--dot-active);

      border:2px solid transparent;
      border-radius:2px;
      cursor:pointer;
      user-select:none;
      background:#fff;

      background:#fff4f4;
      box-shadow:0 0 2px rgba(225,87,87,.45);
    }

      width:9px;
      height:9px;
      border-radius:50%;
      background:#3f9b45;
      box-shadow:0 0 2px #2f7d35;
    }

      width:9px;
      height:9px;
      border-radius:50%;
      background:#c84242;
      box-shadow:0 0 2px #8f2929;
    }

      height:22px;
      border-radius:50%;
      border:2px solid #9d9d9d;
      background:#e8e8e8;
      display:inline-grid;
      place-items:center;
      flex:0 0 auto;
      margin-top:1px;
    }

      width:9px;
      height:9px;
      border-radius:50%;
      background:#656565;
      box-shadow:0 0 2px #333;
    }

      line-height:1.45;
      color:#5a5a5a;
      font-size:16px;
    }
    .answer-feedback {

      padding:12px 14px;
      border-left:4px solid #4caf50;
      background:#f1fbf3;
      color:#315d34;
      font-weight:700;
      line-height:1.45;
      display:none;

    }

      background:#fff4f4;
      color:#7a2d2d;
    }

      padding: 0 10px;

      align-items:center;
      gap:16px;

        top:5px;

      .dot {
        width:5px;
        height:5px;
      }
      .dot.active {
        width:8px;
        height:8px;
      }
      .option {

        min-height:52px;
      }
      .radio {
        width:21px;
        height:21px;
      }
      .bottom-controls {
        padding:0;
        margin-top:20px;
      }
      .arrow-btn {
        min-width:110px;
        height:42px;
        font-size:12px;
      }
      .status {
        font-size:12px;
      }
    }

    "sectionTitle": "ATI TEAS Version 7 - Reading",
    "passageTitle": "",
    "passageHtml": "<p>Taxidermy is the art of preserving animals. This craft blends art, science, and craftsmanship to create lifelike representations of animals in naturalistic settings for display, education, or research. Taxidermists often work for museums, creating or restoring exhibits, but they also serve hunters and fishermen who wish to preserve their trophies.</p><p>The process of taxidermy involves careful skinning and tanning of the hide, molding and sculpting an accurate form of the animal's body, and then meticulously attaching the prepared skin onto the form. The final step requires detailed painting and grooming to enhance the realism of the animal. This meticulous process allows for the natural beauty and majesty of wildlife to be preserved and appreciated.</p><p>This profession requires not only technical skills but also a respect for nature and wildlife ethics, ensuring that the practice promotes conservation and appreciation of biodiversity. Ethical practices are ensured through strict regulation. Laws differ by country, but they share common elements designed to protect wildlife. In the United States, for example, the U.S. Fish and Wildlife Service (USFWS) enforces laws that regulate which species can be taxidermized. Endangered species and migratory birds, for instance, are protected under specific acts. To work with these animals, taxidermists must obtain special permits.</p><p>Moreover, taxidermists are often required to keep detailed records of their work, including the origins of each specimen and its treatment process. This documentation helps wildlife officials track the use of animal parts, prevent illegal trade, and manage animal populations, ensuring that local ecosystems remain balanced and illegal hunting is discouraged.</p>",

    "passageHtml": "<p>On February 2 of each year, the United States observes the unusual holiday of Groundhog Day, as a day of hope that winter is over and spring is beginning. This tradition has been officially observed in the U.S. since the 1800s, and is believed to have developed from European folk traditions in which a bear, fox, badger, or even hedgehog would serve as the symbolic meteorologist. Although other cultures and towns observe Groundhog Day (or something similar), the town of Punxsutawney, Pennsylvania takes special pride in being home to the one true forecasting groundhog, Punxsutawney Phil. At the turn of the twentieth century, townspeople formed the Punxsutawney Groundhog Club to perpetuate the joyful rituals and events surrounding Groundhog Day. Over the years, these events have come to include a scavenger hunt, a talent show, and a ball.</p><p>Legend has it that on Groundhog Day the official weather forecasting groundhog awakens from hibernation and comes out of his burrow to look for his shadow. If he sees his shadow, six more weeks of winter are to come, and Punxsutawney Phil goes back to bed. However, if he does not see his shadow, Punxsutawney Phil takes this as a sign that spring has arrived, and he remains above ground. Of course, common sense tells us that February 2 is too early for spring to begin, and that while animals may be attuned to various elements of nature from which humans might learn, they are unlikely to act on their instincts based on a schedule set by a Gregorian calendar. Nevertheless, a visit to Pennsylvania to see Punxsutawney Phil and all of the fun he inspires each year might just provide the touch of hope needed to reach the end of winter.</p>",

const totalQuestions = questions.length;
const initialSeconds = 60 * 60;
let current = 0;
let answers = Array(questions.length).fill(null);
let remaining = initialSeconds;

const qNumber = document.getElementById('questionNumber');
const brandTitle = document.getElementById('brandTitle');
const passageTitle = document.getElementById('passageTitle');
const passageEl = document.getElementById('passage');
const stimulusEl = document.getElementById('stimulus');
const questionText = document.getElementById('questionText');
const dotsEl = document.getElementById('dots');
const optionsEl = document.getElementById('options');
const feedbackEl = document.getElementById('answerFeedback');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('status');
const mainEl = document.querySelector('.main');
const leftColEl = document.querySelector('.left-col');
const rightColEl = document.querySelector('.right-col');

function buildDots(activeNumber) {
  dotsEl.innerHTML = '';
  for (let i = 1; i <= totalQuestions; i++) {
    const d = document.createElement('span');
    d.className = 'dot' + (i === activeNumber ? ' active' : '');
    dotsEl.appendChild(d);
  }
}

function setQuestionLayout(item) {
  const hasLeftContent = Boolean((item.passageTitle || '').trim() || (item.passageHtml || '').trim());
  if (hasLeftContent) {
    mainEl.style.gridTemplateColumns = '';
    leftColEl.style.display = '';
    rightColEl.style.paddingTop = '';
  } else {
    mainEl.style.gridTemplateColumns = '1fr';
    leftColEl.style.display = 'none';
    rightColEl.style.paddingTop = '4px';
  }
}

function render() {
  const item = questions[current];
  setQuestionLayout(item);

  brandTitle.textContent = item.sectionTitle || 'ATI TEAS Version 7 - Reading';
  qNumber.textContent = `Question: ${item.number} of ${totalQuestions}`;
  passageTitle.textContent = item.passageTitle || '';
  passageEl.innerHTML = item.passageHtml || '';
  stimulusEl.innerHTML = item.stimulusHtml || item.stimulus || '';
  questionText.innerHTML = (item.question || '').replace(/\n/g, '<br>');

  buildDots(item.number);

  optionsEl.innerHTML = '';
  item.options.forEach((opt, index) => {
    const row = document.createElement('div');
    const answered = answers[current] !== null;
    let className = 'option';
    if (answers[current] === index) className += ' selected';
    if (answered && index === item.correctIndex) className += ' correct';
    if (answered && answers[current] === index && index !== item.correctIndex) className += ' incorrect';
    row.className = className;
    row.tabIndex = 0;

    const radio = document.createElement('span');
    radio.className = 'radio';

    const label = document.createElement('span');
    label.className = 'option-text';
    label.textContent = opt;

    row.appendChild(radio);
    row.appendChild(label);

    row.addEventListener('click', () => selectOption(index));
    row.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectOption(index);
      }
    });

    optionsEl.appendChild(row);
  });

  if (answers[current] !== null) {
    const correctText = item.options[item.correctIndex];
    const isCorrect = answers[current] === item.correctIndex;
    feedbackEl.className = 'answer-feedback show' + (isCorrect ? '' : ' wrong');
    feedbackEl.textContent = isCorrect
      ? `Correct. Answer: ${correctText}`
      : `Incorrect. Correct answer: ${correctText}`;
  } else {
    feedbackEl.className = 'answer-feedback';
    feedbackEl.textContent = '';
  }

  prevBtn.disabled = current === 0;
  nextBtn.textContent = current === questions.length - 1 ? 'Finish' : 'Continue';
  statusEl.textContent = `${answers.filter(a => a !== null).length} of ${questions.length} uploaded reading questions answered`;
}

function selectOption(index) {
  answers[current] = index;
  render();
}

prevBtn.addEventListener('click', () => {
  if (current > 0) {
    current--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

nextBtn.addEventListener('click', () => {
  if (current < questions.length - 1) {
    current++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    alert('You have reached the end of the uploaded reading questions.');
  }
});

function tick() {
  if (remaining > 0) remaining--;
  const h = String(Math.floor(remaining / 3600)).padStart(2, '0');
  const m = String(Math.floor((remaining % 3600) / 60)).padStart(2, '0');
  const s = String(remaining % 60).padStart(2, '0');
  timerEl.textContent = `${h}:${m}:${s}`;
}

render();
setInterval(tick, 1000);
</script>
