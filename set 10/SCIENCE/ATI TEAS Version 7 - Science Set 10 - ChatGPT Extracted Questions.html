<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATI TEAS Version 7 Science Practice Questions</title>
  <style>
    :root {
      --text:#4a4a4a;
      --heading:#333;
      --blue:#caebfb;
      --blue-strong:#b7dcff;
      --btn:#b6e4e7;
      --btn-text:#50646b;
      --dot:#8b8f92;
      --dot-light:#c1e5fb;
      --dot-active:#89bce8;
      --olive:#6b7300;
    }
    * { box-sizing: border-box; }
    body {
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background:#fff;
    }
    .exam-shell {
      max-width: 1280px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 34px 32px 42px;
      display:flex;
      flex-direction:column;
    }
    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding: 0 10px 16px;
      margin-bottom: 10px;
      border-bottom: 5px solid transparent;
      border-image: repeating-linear-gradient(135deg, var(--blue) 0 3px, transparent 3px 8px) 12;
    }
    .brand {
      font-size: 18px;
      font-weight: 700;
      color:#3a3a3a;
    }
    .close {
      border:none;
      background:#f8f8f8;
      color:#444;
      font-weight:700;
      font-size:14px;
      padding:10px 16px;
      display:flex;
      align-items:center;
      gap:6px;
      text-transform:uppercase;
    }
    .close .x {
      width:16px;
      height:16px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:#444;
      color:#fff;
      line-height:1;
      font-size:12px;
    }
    .main {
      flex:1;
      display:grid;
      grid-template-columns: minmax(0, 1fr) minmax(420px, 500px);
      gap: 36px;
      align-items:start;
      padding: 6px 8px 0;
    }
    .left-col {
      min-width:0;
    }
    .right-col {
      min-width:0;
      padding-top: 4px;
    }
    .top-question-row {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:24px;
      margin-bottom: 18px;
      padding: 0 6px;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      color: var(--heading);
      font-size: 28px;
      margin: 0;
      line-height: 1.2;
    }
    .utility {
      text-align:right;
      flex:0 0 auto;
      min-width: 195px;
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:10px;
    }
    .timer-row {
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:14px;
      width:100%;
    }
    .timer {
      font-weight:700;
      margin-bottom:0;
      white-space:nowrap;
    }
    .timer span { font-weight:400; }
    .flag-row {
      display:flex;
      justify-content:flex-end;
      width:100%;
    }
    .calc {
      width:33px;
      height:43px;
      border:4px solid var(--olive);
      position:relative;
      flex:0 0 auto;
    }
    .calc:before {
      content:"";
      position:absolute;
      left:6px;
      right:6px;
      top:5px;
      height:6px;
      background:#fff;
    }
    .calc:after {
      content:"";
      position:absolute;
      left:6px;
      top:18px;
      width:4px;
      height:4px;
      background:#fff;
      box-shadow:9px 0 #fff,18px 0 #fff,0 9px #fff,9px 9px #fff,18px 9px #fff,0 18px #fff,9px 18px #fff,18px 18px #fff;
    }
    .flag {
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid #d6d6d6;
      background:#fff;
      padding:11px 16px;
      color:#555;
      font-weight:700;
      box-shadow:0 1px 2px rgba(0,0,0,.05);
    }
    .flag-icon {
      width:22px;
      height:27px;
      border:3px solid #555;
      border-top:none;
      position:relative;
    }
    .flag-icon:before {
      content:"";
      position:absolute;
      left:5px;
      top:-9px;
      width:13px;
      height:24px;
      background:#555;
      clip-path:polygon(0 0,100% 0,100% 78%,50% 58%,0 78%);
    }
    .passage-title {
      font-weight:700;
      font-size:18px;
      color:#444;
      margin: 0 0 14px;
    }
    .passage {
      font-size:16px;
      line-height:1.52;
      color:#595959;
      padding: 0 6px 8px;
    }
    .passage p {
      margin: 0 0 14px;
    }
    .passage ul {
      margin: 0 0 14px 24px;
      padding:0;
    }
    .passage li {
      margin: 0 0 7px;
    }
    .stimulus {
      font-weight:700;
      font-size:18px;
      color:#444;
      margin: 0 0 2px;
    }
    .diagram-stimulus {
      margin: 14px 0 26px;
      text-align:left;
    }
    .diagram-stimulus img {
      display:block;
      height:auto;
      max-width:100%;
      background:#fff;
      border:0;
    }
    .question-text {
      border-top:1px solid #dfdfdf;
      padding-top:8px;
      font-weight:700;
      color:#3d3d3d;
      font-size:17px;
      line-height:1.35;
      margin-bottom:16px;
    }
    .dots {
      display:flex;
      align-items:center;
      gap:11px;
      margin: 0 0 24px;
      overflow:hidden;
      flex-wrap:nowrap;
    }
    .dot {
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--dot);
      flex:0 0 auto;
    }
    .dot:nth-child(7n) { background:var(--dot-light); }
    .dot.active {
      width:9px;
      height:9px;
      background:var(--dot-active);
      box-shadow:0 0 0 2px rgba(139,187,230,.18);
    }
    .options {
      display:flex;
      flex-direction:column;
      gap:7px;
      padding-bottom: 10px;
    }
    .option {
      min-height: 54px;
      display:flex;
      align-items:flex-start;
      gap:16px;
      padding:12px 14px;
      border:2px solid transparent;
      border-radius:2px;
      cursor:pointer;
      user-select:none;
      background:#fff;
    }
    .option:hover,
    .option.selected {
      border-color:var(--blue-strong);
      box-shadow:0 0 2px rgba(80,145,255,.45);
    }
    .option.correct {
      border-color:#4caf50;
      background:#f1fbf3;
      box-shadow:0 0 2px rgba(76,175,80,.45);
    }
    .option.incorrect {
      border-color:#e15757;
      background:#fff4f4;
      box-shadow:0 0 2px rgba(225,87,87,.45);
    }
    .option.correct .radio::after {
      content:"";
      width:9px;
      height:9px;
      border-radius:50%;
      background:#3f9b45;
      box-shadow:0 0 2px #2f7d35;
    }
    .option.incorrect .radio::after {
      content:"";
      width:9px;
      height:9px;
      border-radius:50%;
      background:#c84242;
      box-shadow:0 0 2px #8f2929;
    }
    .radio {
      width:22px;
      height:22px;
      border-radius:50%;
      border:2px solid #9d9d9d;
      background:#e8e8e8;
      display:inline-grid;
      place-items:center;
      flex:0 0 auto;
      margin-top:1px;
    }
    .selected .radio::after {
      content:"";
      width:9px;
      height:9px;
      border-radius:50%;
      background:#656565;
      box-shadow:0 0 2px #333;
    }
    .option-text {
      line-height:1.45;
      color:#5a5a5a;
      font-size:16px;
    }
    .answer-feedback {
      margin-top:14px;
      padding:12px 14px;
      border-left:4px solid #4caf50;
      background:#f1fbf3;
      color:#315d34;
      font-weight:700;
      line-height:1.45;
      display:none;
    }
    .answer-feedback.show {
      display:block;
    }
    .answer-feedback.wrong {
      border-left-color:#e15757;
      background:#fff4f4;
      color:#7a2d2d;
    }
    .bottom-controls {
      margin-top: 28px;
      padding: 0 10px;
    }
    .nav {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
    }
    .arrow-btn {
      border:none;
      background:var(--btn);
      color:var(--btn-text);
      font-weight:700;
      min-width:126px;
      height:45px;
      cursor:pointer;
      position:relative;
      text-transform:uppercase;
      letter-spacing:.2px;
    }
    .prev {
      clip-path:polygon(22px 0,100% 0,100% 100%,22px 100%,0 50%);
      padding-left:18px;
    }
    .next {
      clip-path:polygon(0 0,calc(100% - 22px) 0,100% 50%,calc(100% - 22px) 100%,0 100%);
      padding-right:18px;
    }
    .arrow-btn:disabled {
      opacity:.45;
      cursor:not-allowed;
    }
    .status {
      margin-top:12px;
      text-align:center;
      color:#777;
      font-size:13px;
    }
    @media (max-width: 980px) {
      .exam-shell {
        padding: 18px 14px 28px;
      }
      .topbar {
        padding: 0 0 12px;
      }
      .brand {
        font-size: 15px;
      }
      .close {
        font-size:12px;
        padding:8px 10px;
      }
      .top-question-row {
        flex-direction:column;
        gap:10px;
        margin-bottom:14px;
        padding:0;

        min-width:0;
        text-align:right;
        align-items:flex-end;
        align-self:flex-end;
        margin-left:auto;
        gap:8px;
      }
      .timer-row {
        justify-content:flex-end;
        gap:10px;
      }
      .flag-row {
        justify-content:flex-end;
        width:100%;
      }
      .calc {
        width:28px;
        height:38px;
        border-width:3px;
      }
      .calc:before {
        left:5px;
        right:5px;
        top:5px;
        height:5px;
      }
      .calc:after {
        left:5px;
        top:16px;
        width:3px;
        height:3px;
        box-shadow:8px 0 #fff,16px 0 #fff,0 8px #fff,8px 8px #fff,16px 8px #fff,0 16px #fff,8px 16px #fff,16px 16px #fff;
      }
      .flag {
        min-width:96px;
        justify-content:center;
        padding:9px 12px;
        font-size:13px;
      }
      .flag-icon {
        width:20px;
        height:24px;
      }
      .main {
        grid-template-columns: 1fr;
        gap: 20px;
        padding:0;
      }
      h1 {
        font-size:24px;
      }
      .passage-title, .stimulus {
        font-size:17px;
      }
      .passage,
      .option-text {
        font-size:14px;
      }
      .question-text {
        font-size:15px;
      }
      .diagram-stimulus {
        margin: 12px 0 22px;
      }
      .diagram-stimulus img {
        width:100% !important;
        max-width:100% !important;
      }
      .dots {
        gap:8px;
        margin-bottom:18px;
      }
      .dot {
        width:5px;
        height:5px;
      }
      .dot.active {
        width:8px;
        height:8px;
      }
      .option {
        gap:12px;
        padding:10px 8px;
        min-height:52px;
      }
      .radio {
        width:21px;
        height:21px;
      }
      .bottom-controls {
        padding:0;
        margin-top:20px;
      }
      .arrow-btn {
        min-width:110px;
        height:42px;
        font-size:12px;
      }
      .status {
        font-size:12px;
      }
    }
  </style>
</head>

    <div class="bottom-controls">

    mainEl.style.gridTemplateColumns = '1fr';
    leftColEl.style.display = 'none';
    rightColEl.style.paddingTop = '4px';
  }
}

function render() {
  const item = questions[current];
  setQuestionLayout(item);

  brandTitle.textContent = item.sectionTitle || 'ATI TEAS Version 7 - Science';
  qNumber.textContent = `Question: ${item.number} of ${totalQuestions}`;
  passageTitle.textContent = item.passageTitle || '';
  passageEl.innerHTML = item.passageHtml || '';
  stimulusEl.innerHTML = item.stimulusHtml || item.stimulus || '';
  questionText.innerHTML = (item.question || '').replace(/\n/g, '<br>');

  buildDots(item.number);

  optionsEl.innerHTML = '';
  item.options.forEach((opt, index) => {
    const row = document.createElement('div');
    const answered = answers[current] !== null;
    let className = 'option';
    if (answers[current] === index) className += ' selected';
    if (answered && index === item.correctIndex) className += ' correct';
    if (answered && answers[current] === index && index !== item.correctIndex) className += ' incorrect';
    row.className = className;
    row.tabIndex = 0;

    const radio = document.createElement('span');
    radio.className = 'radio';

    const label = document.createElement('span');
    label.className = 'option-text';
    label.textContent = opt;

    row.appendChild(radio);
    row.appendChild(label);

    row.addEventListener('click', () => selectOption(index));
    row.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectOption(index);
      }
    });

    optionsEl.appendChild(row);
  });

  if (answers[current] !== null) {
    const correctText = item.options[item.correctIndex];
    const isCorrect = answers[current] === item.correctIndex;
    feedbackEl.className = 'answer-feedback show' + (isCorrect ? '' : ' wrong');
    feedbackEl.textContent = isCorrect
      ? `Correct. Answer: ${correctText}`
      : `Incorrect. Correct answer: ${correctText}`;
  } else {
    feedbackEl.className = 'answer-feedback';
    feedbackEl.textContent = '';
  }

  prevBtn.disabled = current === 0;
  nextBtn.textContent = current === questions.length - 1 ? 'Finish' : 'Continue';
  statusEl.textContent = `${answers.filter(a => a !== null).length} of ${questions.length} uploaded science questions answered`;
}

function selectOption(index) {
  answers[current] = index;
  render();
}

prevBtn.addEventListener('click', () => {
  if (current > 0) {
    current--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

nextBtn.addEventListener('click', () => {
  if (current < questions.length - 1) {
    current++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    alert('You have reached the end of the uploaded science questions.');
  }
});

function tick() {
  if (remaining > 0) remaining--;
  const h = String(Math.floor(remaining / 3600)).padStart(2, '0');
  const m = String(Math.floor((remaining % 3600) / 60)).padStart(2, '0');
  const s = String(remaining % 60).padStart(2, '0');
  timerEl.textContent = `${h}:${m}:${s}`;
}

render();
setInterval(tick, 1000);
</script>
</body>
</html>
