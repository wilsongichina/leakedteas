    "passageHtml": "<p>Dear Aunt Suzanne,</p><p>I have a few minutes before I get on the bus from Galway back to Dublin and wanted to tell you how my class trip to Ireland is going. We just spent 2 days on Inis Mor, the largest of the Aran Islands, which are just off the central west coast of Ireland. We took a ferry from Galway, a ride that takes about an hour and was quite gray and stormy.</p><p>For an island that is only about 12 square miles, there is a lot to do and see on Inis Mor! After eating steak and vegetable stew and brown bread with butter, we went to the sweater market, where all kinds of woolen products are sold. The Aran Islands are known for their wool because sheep thrive here and generations have used woolen sweaters and hats to survive long cold days of fishing on the open sea. In fact, I learned that each family or clan has its own signature knitting pattern and some are able to tell which family someone belongs to by the pattern of their sweater! The Healy pattern is an interesting combination of twists and braids, and I found you a birthday souvenir with a beautiful example.</p><p>The next day, we rented bicycles and toured the island. We saw ancient ruins, a prehistoric hill fort, and a white sand beach. We also climbed down to a mysterious rock formation known as \"The Worm Hole,\" a rectangular hole in a stone shore that fills with thrashing waves and looks like it houses a terrible serpent. The Worm Hole was difficult to find, and when we stopped someone for directions, she only spoke Gaelic! Sometimes this island seems stuck in an earlier time.</p><p>I'm excited to see you when I get home. I have lots more pictures to share!</p><p>Love, Eva</p>",

    "passageHtml": "<p>What is all this talk of cicadas lately in the United States? You might be wondering why the media has featured it, but in fact, the discussion about cicadas has emerged about as predictably as the cicadas themselves from their underground refuge. Let's get oriented with some background on cicadas.</p><p>What is a cicada? A typical definition will at least tell you that the cicada is a large, loud insect with long transparent wings, mostly found in warm countries. A more detailed response might also inform you that cicadas have short antennae and wide-set eyes that jut out, with delicate, translucent wings -- and that not only is the cicada loud, but few creatures make a louder sound. In fact, it is male cicadas that are the noisy ones, to the tune of 80 to 100 decibels, which is like the roar of a loud engine. This is because male cicadas make a strident, high buzzing by vibrating two membranes on its abdomen called tymbals, effectively turning its body into a kind of echo chamber or drum. Female cicadas cannot replicate the buzzing, though they respond with a clicking sound when they are ready to mate.</p><p>Although there are several species of cicada, mating typically takes place in trees whereafter the female deposits the eggs into the bark. When the eggs hatch, the larval cicadas, called nymphs, drop to the ground and burrow. They then live as nymphs for most of their lives over 6 feet underground, with both male and female cicadas dying within weeks of their emergence from the soil. This is particularly true for North American cicadas, especially the Magicicada, or periodical cicadas, which regularly emerge in intervals of 13 or 17 years, depending on the species and the location. This is why talk of cicadas in the media is as predictable as their emergence in the U.S.</p>",

const totalQuestions = questions.length;
const initialSeconds = 60 * 60;
let current = 0;
let answers = Array(questions.length).fill(null);
let remaining = initialSeconds;

const qNumber = document.getElementById('questionNumber');
const brandTitle = document.getElementById('brandTitle');
const passageTitle = document.getElementById('passageTitle');
const passageEl = document.getElementById('passage');
const stimulusEl = document.getElementById('stimulus');
const questionText = document.getElementById('questionText');
const dotsEl = document.getElementById('dots');
const optionsEl = document.getElementById('options');
const feedbackEl = document.getElementById('answerFeedback');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('status');
const mainEl = document.querySelector('.main');
const leftColEl = document.querySelector('.left-col');
const rightColEl = document.querySelector('.right-col');

function buildDots(activeNumber) {
  dotsEl.innerHTML = '';
  for (let i = 1; i <= totalQuestions; i++) {
    const d = document.createElement('span');
    d.className = 'dot' + (i === activeNumber ? ' active' : '');
    dotsEl.appendChild(d);
  }
}

function setQuestionLayout(item) {
  const hasLeftContent = Boolean((item.passageTitle || '').trim() || (item.passageHtml || '').trim());
  if (hasLeftContent) {
    mainEl.style.gridTemplateColumns = '';
    leftColEl.style.display = '';
    rightColEl.style.paddingTop = '';
  } else {
    mainEl.style.gridTemplateColumns = '1fr';
    leftColEl.style.display = 'none';
    rightColEl.style.paddingTop = '4px';
  }
}

function render() {
  const item = questions[current];
  setQuestionLayout(item);

  brandTitle.textContent = item.sectionTitle || 'ATI TEAS Version 7 - Reading';
  qNumber.textContent = `Question: ${item.number} of ${totalQuestions}`;
  passageTitle.textContent = item.passageTitle || '';
  passageEl.innerHTML = item.passageHtml || '';
  stimulusEl.innerHTML = item.stimulusHtml || item.stimulus || '';
  questionText.innerHTML = (item.question || '').replace(/\n/g, '<br>');

  buildDots(item.number);

  optionsEl.innerHTML = '';
  item.options.forEach((opt, index) => {
    const row = document.createElement('div');
    const answered = answers[current] !== null;
    let className = 'option';
    if (answers[current] === index) className += ' selected';
    if (answered && index === item.correctIndex) className += ' correct';
    if (answered && answers[current] === index && index !== item.correctIndex) className += ' incorrect';
    row.className = className;
    row.tabIndex = 0;

    const radio = document.createElement('span');
    radio.className = 'radio';

    const label = document.createElement('span');
    label.className = 'option-text';
    label.textContent = opt;

    row.appendChild(radio);
    row.appendChild(label);

    row.addEventListener('click', () => selectOption(index));
    row.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectOption(index);
      }
    });

    optionsEl.appendChild(row);
  });

  if (answers[current] !== null) {
    const correctText = item.options[item.correctIndex];
    const isCorrect = answers[current] === item.correctIndex;
    feedbackEl.className = 'answer-feedback show' + (isCorrect ? '' : ' wrong');
    feedbackEl.textContent = isCorrect
      ? `Correct. Answer: ${correctText}`
      : `Incorrect. Correct answer: ${correctText}`;
  } else {
    feedbackEl.className = 'answer-feedback';
    feedbackEl.textContent = '';
  }

  prevBtn.disabled = current === 0;
  nextBtn.textContent = current === questions.length - 1 ? 'Finish' : 'Continue';
  statusEl.textContent = `${answers.filter(a => a !== null).length} of ${questions.length} uploaded Reading questions answered`;
}

function selectOption(index) {
  answers[current] = index;
  render();
}

prevBtn.addEventListener('click', () => {
  if (current > 0) {
    current--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});

nextBtn.addEventListener('click', () => {
  if (current < questions.length - 1) {
    current++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    alert('You have reached the end of the uploaded Reading questions.');
  }
});

function tick() {
  if (remaining > 0) remaining--;
  const h = String(Math.floor(remaining / 3600)).padStart(2, '0');
  const m = String(Math.floor((remaining % 3600) / 60)).padStart(2, '0');
  const s = String(remaining % 60).padStart(2, '0');
  timerEl.textContent = `${h}:${m}:${s}`;
}

render();
setInterval(tick, 1000);
</script>
