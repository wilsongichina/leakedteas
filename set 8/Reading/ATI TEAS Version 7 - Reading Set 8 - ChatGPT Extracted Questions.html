    "passageHtml": "<p>The Deaf President Now (DPN) movement marked a growing shift in perceptions of deaf people.</p><p>Gallaudet University, in Washington D.C., was established as a school for deaf students. The founder convinced Congress to fund the school, and it eventually became an institution for higher learning. In a nod of support, U.S. President Ulysses S. Grant signed the Gallaudet diplomas. Future presidents continued the tradition, so all Gallaudet graduates receive diplomas signed by the U.S. President. Gallaudet University grew as a center for deaf education and advocacy.</p><p>In 1988, Gallaudet University was selecting a new university president. The board of trustees had well-qualified candidates, and all but one was deaf. On a Sunday, the board hastily announced they had selected the sole hearing candidate.</p><p>The reaction on campus was outrage. Students congregated to protest. Crowds marched to the meeting location and demanded an explanation. Through the closed-door discussion with protest leaders, a trustee created more discontent. He allegedly stated, \"Deaf people are not able to function in a hearing world.\"</p><p>Throughout the week, there were more speeches and rallies. A media blitz spread the news globally. Students did not attend class to express their anger. Protest leaders formalized their demands, including a deaf president, the offending trustee must resign, the board of trustees must have 51% deaf leadership, and no reprisals against participants.</p><p>Support flowed in from across the world. The U.S. Vice President wrote, \"Gallaudet has a responsibility to set an example and thus to appoint a president who is not only highly qualified, but who is also deaf.\"</p><p>After a week of peaceful protests, speeches, and news coverage, the newly appointed hearing president resigned. Students wore buttons that read 3½, indicating how many demands were left.</p>",

    "passageHtml": "<p>On February 2 of each year, the United States observes the unusual holiday of Groundhog Day, a day of hope that winter is over and spring is beginning. This tradition has been officially observed in the U.S. since the 1800s, and is believed to have developed from European folk traditions in which a bear, fox, badger, or even hedgehog would serve as the symbolic meteorologist. Although other cultures and towns observe Groundhog Day (or something similar), the town of Punxsutawney, Pennsylvania takes special pride in being home to the one true forecasting groundhog, Punxsutawney Phil. At the turn of the twentieth century, townspeople formed the Punxsutawney Groundhog Club to perpetuate the joyful rituals and events surrounding Groundhog Day. Over the years, these events have come to include a scavenger hunt, a talent show, and a ball.</p><p>Legend has it that on Groundhog Day the official weather forecasting groundhog awakens from hibernation and comes out of his burrow to look for his shadow. If he sees his shadow, six more weeks of winter are to come, and Punxsutawney Phil goes back to bed. However, if he does not see his shadow, Punxsutawney Phil takes this as a sign that spring has arrived, and he remains above ground. Of course, common sense tells us that February 2 is too early for spring to begin, and that while animals may be attuned to various elements of nature from which humans might learn, they are unlikely to act on their instincts based on a schedule set by a Gregorian calendar. Nevertheless, a visit to Pennsylvania to see Punxsutawney Phil and all of the fun he inspires each year might just provide the touch of hope needed to reach the end of winter.</p>",

ow.tabIndex=0;const radio=document.createElement('span');radio.className='radio';const label=document.createElement('span');label.className='option-text';label.textContent=opt;row.appendChild(radio);row.appendChild(label);row.addEventListener('click',()=>selectOption(index));row.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();selectOption(index)}});optionsEl.appendChild(row)});if(answers[current]!==null){const ok=answers[current]===item.correctIndex;feedbackEl.className='answer-feedback show'+(ok?'':' wrong');feedbackEl.textContent=ok?`Correct. Answer: ${item.options[item.correctIndex]}`:`Incorrect. Correct answer: ${item.options[item.correctIndex]}`}else{feedbackEl.className='answer-feedback';feedbackEl.textContent=''}prevBtn.disabled=current===0;nextBtn.textContent=current===totalQuestions-1?'Finish':'Continue';statusEl.textContent=`${answers.filter(a=>a!==null).length} of ${totalQuestions} uploaded Reading Set 8 questions answered | Source: ${item.sourceFile}`}function selectOption(index){answers[current]=index;render()}prevBtn.addEventListener('click',()=>{if(current>0){current--;render();window.scrollTo({top:0,behavior:'smooth'})}});nextBtn.addEventListener('click',()=>{if(current<totalQuestions-1){current++;render();window.scrollTo({top:0,behavior:'smooth'})}else{alert('You have reached the end of the uploaded Reading Set 8 questions.')}});function tick(){if(remaining>0)remaining--;const h=String(Math.floor(remaining/3600)).padStart(2,'0');const m=String(Math.floor((remaining%3600)/60)).padStart(2,'0');const s=String(remaining%60).padStart(2,'0');timerEl.textContent=`${h}:${m}:${s}`}render();setInterval(tick,1000);</script></body></html>
