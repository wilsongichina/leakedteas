const totalQuestions = questions.length;
let current = 0;
let answers = questions.map(q => q.multi ? [] : null);
let remaining = 60 * 60;
const qNumber=document.getElementById('questionNumber'),brandTitle=document.getElementById('brandTitle'),stimulusEl=document.getElementById('stimulus'),questionText=document.getElementById('questionText'),dotsEl=document.getElementById('dots'),optionsEl=document.getElementById('options'),feedbackEl=document.getElementById('answerFeedback'),prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn'),timerEl=document.getElementById('timer'),statusEl=document.getElementById('status');
function buildDots(active){dotsEl.innerHTML='';for(let i=1;i<=totalQuestions;i++){const d=document.createElement('span');d.className='dot'+(i===active?' active':'');dotsEl.appendChild(d);}}
function sameArray(a,b){return a.length===b.length&&a.every(v=>b.includes(v));}
function hasAnswer(q,ans){return q.multi ? ans.length>0 : ans!==null;}
function answerText(q){const idxs=q.multi?q.correctIndexes:[q.correctIndex];return idxs.map(i=>q.options[i]).join('; ');}
function render(){const item=questions[current];const ans=answers[current];brandTitle.textContent=item.sectionTitle;qNumber.textContent=`Question: ${item.sourceNumber} of 37`;stimulusEl.innerHTML=item.stimulusHtml||'';questionText.innerHTML=(item.question||'').replace(/\n/g,'<br>');buildDots(item.number);optionsEl.innerHTML='';item.options.forEach((opt,index)=>{const selected=item.multi?ans.includes(index):ans===index;const answered=hasAnswer(item,ans);const correct=item.multi?item.correctIndexes.includes(index):index===item.correctIndex;let cls='option'+(item.multi?' checkbox':'')+(selected?' selected':'');if(answered&&correct)cls+=' correct';if(answered&&selected&&!correct)cls+=' incorrect';const row=document.createElement('div');row.className=cls;row.tabIndex=0;const radio=document.createElement('span');radio.className='control';const label=document.createElement('span');label.className='option-text';label.textContent=opt;row.appendChild(radio);row.appendChild(label);row.addEventListener('click',()=>selectOption(index));row.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();selectOption(index);}});optionsEl.appendChild(row);});if(hasAnswer(item,ans)){const ok=item.multi?sameArray(ans,item.correctIndexes):ans===item.correctIndex;feedbackEl.className='answer-feedback show'+(ok?'':' wrong');feedbackEl.textContent=ok?`Correct. Answer: ${answerText(item)}`:`Incorrect. Correct answer: ${answerText(item)}`;}else{feedbackEl.className='answer-feedback';feedbackEl.textContent='';}prevBtn.disabled=current===0;nextBtn.textContent=current===totalQuestions-1?'Finish':'Continue';statusEl.textContent=`${answers.filter((a,i)=>hasAnswer(questions[i],a)).length} of ${totalQuestions} uploaded English questions answered | Source: ${item.sourceFile}`;}
function selectOption(index){const item=questions[current];if(item.multi){const cur=answers[current];answers[current]=cur.includes(index)?cur.filter(i=>i!==index):cur.concat(index).sort((a,b)=>a-b);}else{answers[current]=index;}render();}
prevBtn.addEventListener('click',()=>{if(current>0){current--;render();window.scrollTo({top:0,behavior:'smooth'});}});
nextBtn.addEventListener('click',()=>{if(current<totalQuestions-1){current++;render();window.scrollTo({top:0,behavior:'smooth'});}else{alert('You have reached the end of the uploaded English Set 8 questions.');}});
function tick(){if(remaining>0)remaining--;const h=String(Math.floor(remaining/3600)).padStart(2,'0');const m=String(Math.floor((remaining%3600)/60)).padStart(2,'0');const s=String(remaining%60).padStart(2,'0');timerEl.textContent=`${h}:${m}:${s}`;}
render();setInterval(tick,1000);
  </script>
